version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# KawKaw Catalog — Portainer-compatible stack
#
# Do NOT use an .env file with this compose file.
# Set all variables in Portainer's "Environment variables" editor when
# deploying the stack (Stack → Add stack → Environment variables section).
#
# Required variables (no safe default — must be set):
#   POSTGRES_PASSWORD   strong password for the database
#   JWT_SECRET_KEY      run: openssl rand -hex 32
#   NEXT_PUBLIC_API_URL http://<your-host-ip>:8080/api
#
# Optional variables (defaults shown):
#   POSTGRES_USER       kawkaw
#   POSTGRES_DB         kawkaw
#   MEDIA_HOST_PATH     /mnt/truenas_photos   (host path of mounted SMB share)
#   SITE_URL            http://localhost:8080  (public URL — used for OG tags + WhatsApp share links)
# ─────────────────────────────────────────────────────────────────────────────

x-api-env: &api-env
  POSTGRES_USER: ${POSTGRES_USER:-kawkaw}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-kawkaw}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  MEDIA_ROOT: /mnt/media
  THUMBS_ROOT: /mnt/thumbs
  THUMBS_URL_PREFIX: /media/thumbs

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - thumbs:/mnt/thumbs:ro
    depends_on:
      - api
      - nextjs
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *api-env
    volumes:
      - ${MEDIA_HOST_PATH:-/mnt/truenas_photos}:/mnt/media:ro
      - thumbs:/mnt/thumbs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      INTERNAL_API_URL: http://api:8000
      SITE_URL: ${SITE_URL:-http://localhost:8080}
    depends_on:
      - api
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      <<: *api-env
    volumes:
      - ${MEDIA_HOST_PATH:-/mnt/truenas_photos}:/mnt/media:ro
      - thumbs:/mnt/thumbs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker beat --loglevel=info
    environment:
      <<: *api-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kawkaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kawkaw}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kawkaw} -d ${POSTGRES_DB:-kawkaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  thumbs:
  pg_data:
  redis_data:
